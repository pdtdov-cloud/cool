name: Build HMA-OSS APK (Final Working)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须拉取子模块，否则编译必崩

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 用官方标准Android SDK Action配置NDK，替代不存在的setup-android-ndk
      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.1.8937393' # 适配HMA-OSS的NDK版本

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # 纯净编译，先跑通基础构建
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMA-OSS-Final-Build
          path: app/build/outputs/apk/debug/*.apk
