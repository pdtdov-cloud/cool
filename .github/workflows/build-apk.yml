name: Build HMA-OSS APK (Debug Full Log)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 配置 Gradle 国内镜像，解决依赖拉取失败
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dmaven.repo.local=/tmp/gradle_cache"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 安装 NDK（HMA-OSS 包含原生代码，必须配置）
      - name: Install NDK
        uses: actions/setup-android-ndk@v1
        with:
          ndk-version: '25.1.8937393'

      # 配置 Gradle 国内镜像，解决依赖拉取失败
      - name: Configure Gradle Mirror
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "systemProp.http.proxyHost=mirrors.aliyun.com" >> ~/.gradle/gradle.properties
          echo "systemProp.http.proxyPort=80" >> ~/.gradle/gradle.properties
          echo "systemProp.https.proxyHost=mirrors.aliyun.com" >> ~/.gradle/gradle.properties
          echo "systemProp.https.proxyPort=80" >> ~/.gradle/gradle.properties

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # 完整调试编译，输出所有日志
      - name: Build Debug APK (Full Log)
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info --warning-mode all

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMA-OSS-Debug-Build
          path: app/build/outputs/apk/debug/*.apk
