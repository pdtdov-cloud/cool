name: Build HMA-OSS APK (Forked)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 解决 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 用你提供的真实原包名修改，彻底解决 sed 报错
      - name: Modify package name (HMA-OSS Adapted)
        run: |
          OLD_PKG="org.frknkrc44.hma_oss"
          NEW_PKG="com.cctv.cool" # 这里改成你自己的包名！
          
          # 1. 单独修改核心配置文件（优先保证关键位置修改成功）
          sed -i "s/$OLD_PKG/$NEW_PKG/g" app/build.gradle.kts
          sed -i "s/$OLD_PKG/$NEW_PKG/g" app/src/main/AndroidManifest.xml
          
          # 2. 全局替换源码中的包名引用（修复 find 语法，加容错）
          find app/src -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" \) | xargs sed -i "s/$OLD_PKG/$NEW_PKG/g" || true

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # 编译 Debug 包，无需签名，可直接安装
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HMA-OSS-APK
          path: app/build/outputs/apk/debug/*.apk
